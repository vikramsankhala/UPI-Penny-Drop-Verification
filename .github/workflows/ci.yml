# CI workflow - runs tests (placeholder for future)
# Uses Razorpay secrets when running integration tests
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify app starts
        env:
          RAZORPAY_KEY_ID: ${{ secrets.RAZORPAY_KEY_ID }}
          RAZORPAY_KEY_SECRET: ${{ secrets.RAZORPAY_KEY_SECRET }}
          RAZORPAY_SOURCE_ACCOUNT: ${{ secrets.RAZORPAY_SOURCE_ACCOUNT }}
        run: |
          timeout 5 python -c "
          from app import app, USE_MOCK
          assert True, 'App loads OK'
          print('Mock mode:', USE_MOCK)
          " || true
